{% extends 'base.html' %}
{% block title %}✅ Senha Redefinida — Fazendinha{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card text-center">
    <div class="auth-illustration">✅</div>
    <h2 class="fw-900 mb-2">Senha redefinida!</h2>
    <p class="fw-600 mb-4" style="color:var(--text-muted)">
      Sua senha foi alterada com sucesso. Agora você pode entrar com sua nova senha.
    </p>
    <a href="{% url 'login' %}" class="btn btn-farm px-5">🔑 Entrar agora</a>
  </div>
</div>
{% endblock %}
