{% extends 'base.html' %}
{% block title %}📨 Link Enviado — Fazendinha{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card text-center">
    <div class="auth-illustration">📨</div>
    <h2 class="fw-900 mb-2">E-mail enviado!</h2>
    <p class="fw-600 mb-4" style="color:var(--text-muted)">
      Se esse e-mail estiver cadastrado, você receberá um link para redefinir sua senha em breve.
      Verifique também a caixa de spam.
    </p>
    <a href="{% url 'login' %}" class="btn btn-farm px-5">🔑 Voltar ao login</a>
  </div>
</div>
{% endblock %}
