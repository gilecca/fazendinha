{% extends 'base.html' %}
{% block title %}🔑 Esqueci minha senha — Fazendinha{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-illustration">🔑</div>
    <h2 class="text-center fw-900 mb-1">Esqueci minha senha</h2>
    <p class="text-center fw-600 mb-4" style="color:var(--text-muted)">
      Informe seu e-mail e enviaremos um link para criar uma nova senha.
    </p>
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-700">E-mail</label>
        <input type="email" name="email" class="form-control farm-input"
               placeholder="seu@email.com" required autofocus>
      </div>
      <button type="submit" class="btn btn-farm w-100 py-2 mt-2">📨 Enviar link de redefinição</button>
    </form>
    <div class="fence-divider my-3"><span>🌱</span></div>
    <p class="text-center fw-600 mb-0">
      Lembrou a senha?
      <a href="{% url 'login' %}" class="fw-800 text-decoration-none" style="color:var(--deeper-green)">Entrar 🔑</a>
    </p>
  </div>
</div>
{% endblock %}
