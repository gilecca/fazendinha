<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sem conexão — Fazendinha</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', 'Segoe UI', sans-serif;
      background: linear-gradient(160deg, #E8F5E9 0%, #FFF8F0 50%, #FFFDE7 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #3E2723;
      text-align: center;
    }
    .icon { font-size: 5rem; margin-bottom: 20px; line-height: 1; }
    h1 { font-size: 1.8rem; font-weight: 900; margin-bottom: 12px; }
    p { font-size: 1rem; color: #8D6E63; font-weight: 600; margin-bottom: 28px; max-width: 320px; line-height: 1.6; }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #66BB6A, #43A047);
      color: white;
      border: none;
      border-radius: 25px;
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(76,175,80,.35);
      transition: transform .2s, box-shadow .2s;
      text-decoration: none;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(76,175,80,.45); }
    .brand {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.3rem;
      font-weight: 900;
      color: #43A047;
    }
    .animals {
      position: fixed;
      bottom: 24px;
      font-size: 1.8rem;
      opacity: .35;
      letter-spacing: 8px;
    }
  </style>
</head>
<body>
  <div class="brand">🌾 Fazendinha</div>

  <div class="icon">📡</div>
  <h1>Você está offline</h1>
  <p>Sem conexão com a internet. Verifique seu Wi-Fi ou dados móveis e tente novamente.</p>
  <button class="btn" onclick="window.location.reload()">🔄 Tentar novamente</button>

  <div class="animals">🐄 🐔 🐷 🌽 🌻</div>
</body>
</html>
